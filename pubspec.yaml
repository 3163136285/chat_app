name: chat_app
description: A two-person chat app for iOS and HarmonyOS
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.1.0
  socket_io_client: ^2.0.3+1
  provider: '6.1.1'
  shared_preferences: ^2.2.2
  intl: ^0.18.1
  image_picker: ^1.0.7
  path_provider: ^2.1.2
  video_player: ^2.8.2
  file_picker: ^6.1.1
  url_launcher: ^6.2.4
  record: ^4.4.4
  audioplayers: ^5.2.1
  flutter_app_badger: ^1.5.0
  geolocator: ^10.1.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  flutter_webrtc: ^0.10.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/
